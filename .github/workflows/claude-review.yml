name: Claude Code Review
on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: p6m7g8-actions/claude@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
